<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oranexa Global Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --sidebar: #0a0a0c; --card: #0c0c0e; --accent: #ffffff; --sub-accent: #10b981; --text: #f3f4f6; --border: #1f1f23; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- AUTH SYSTEM UI --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 340px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-card h2 { letter-spacing: 4px; color: var(--sub-accent); margin-bottom: 5px; }
        .auth-card p { font-size: 0.7rem; color: #555; margin-bottom: 25px; text-transform: uppercase; }
        .auth-input { width: 100%; background: #111; border: 1px solid var(--border); padding: 12px; margin-bottom: 12px; color: white; border-radius: 6px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .auth-input:focus { border-color: var(--sub-accent); }
        .auth-btn { width: 100%; background: var(--sub-accent); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .auth-msg { font-size: 0.75rem; margin-top: 15px; cursor: pointer; color: #888; }
        #err-msg { color: #ef4444; font-size: 0.7rem; margin-top: 10px; min-height: 15px; }

        /* --- LAYOUT --- */
        #sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        .search-bar { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 20px; padding: 8px 20px; color: white; outline: none; }

        .view { display: none; flex: 1; overflow-y: auto; padding: 30px; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; cursor: pointer; }
        .card:hover { border-color: var(--sub-accent); }

        /* --- WORKSPACE & PREVIEW --- */
        #workspace { display: none; height: 100%; width: 100%; }
        #workspace.active { display: flex; }
        .editor { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .preview { width: 50%; background: white; position: relative; }
        #code-box { flex: 1; background: #000; color: #0f0; padding: 20px; font-family: monospace; border: none; resize: none; outline: none; }
        
        .run-btn { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 800; }
        .stop-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 800; }
        .preview-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 10; }

        /* --- FULL VIEW & EXTRAS --- */
        #full-view { position: fixed; inset: 0; background: white; z-index: 8000; display: none; }
        .home-icon { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--sub-accent); z-index: 8001; }
        .user-tag { font-size: 0.7rem; color: #444; margin-top: auto; padding-top: 10px; border-top: 1px solid #111; display: flex; justify-content: space-between; }
        .version-note { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; color: #444; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; z-index: 9000; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2 id="auth-title">ORANEXA</h2>
        <p id="auth-subtitle">Global Cloud Registry</p>
        <input type="text" class="auth-input" id="auth-user" placeholder="Username" autocomplete="off">
        <input type="password" class="auth-input" id="auth-pass" placeholder="Password">
        <button class="auth-btn" onclick="execAuth()">CONNECT</button>
        <div id="err-msg"></div>
        <div class="auth-msg" onclick="toggleAuth()">New Developer? Create Account</div>
    </div>
</div>

<div id="sidebar">
    <button class="auth-btn" onclick="newProject()">+ CREATE WEB</button>
    <button class="auth-btn" style="background:transparent; color:white; border:1px solid #333;" onclick="loadDash()">YOUR WEBS</button>
    <div class="user-tag">
        <span id="active-user">Guest</span>
        <span onclick="logout()" style="color:#ef4444; cursor:pointer;">Logout</span>
    </div>
</div>

<div id="main">
    <header>
        <h2 style="color:var(--sub-accent); cursor:pointer; margin:0; letter-spacing:2px;" onclick="showView('home')">ORA</h2>
        <input type="text" id="search" class="search-bar" placeholder="Search ora:// url or keywords..." onkeypress="handleSearch(event)">
    </header>

    <div id="home" class="view active">
        <div style="text-align:center; margin-top:20vh;">
            <h1 style="font-size:3rem; margin:0;">GLOBAL REGISTRY</h1>
            <p style="color:#555">Alpha 1.0 Active</p>
        </div>
    </div>

    <div id="results" class="view"><div id="res-grid" class="grid"></div></div>
    <div id="dashboard" class="view"><div id="dash-grid" class="grid"></div></div>

    <div id="workspace">
        <div class="editor">
            <div style="background:#111; padding:10px; display:flex; gap:10px;">
                <button onclick="tab('html')">HTML</button>
                <button onclick="tab('css')">CSS</button>
                <button onclick="tab('js')">JS</button>
                <button style="margin-left:auto; background:var(--sub-accent); border:none; padding:5px 15px; font-weight:800; cursor:pointer;" onclick="deploy()">DEPLOY</button>
            </div>
            <textarea id="code-box" oninput="sync()"></textarea>
        </div>
        <div class="preview">
            <div class="preview-controls">
                <button class="run-btn" onclick="run()">▶ RUN</button>
                <button class="stop-btn" onclick="stopPreview()">⏹ STOP</button>
            </div>
            <iframe id="pre-frame" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>
</div>

<div id="full-view">
    <iframe id="full-frame" style="width:100%; height:100%; border:none;"></iframe>
    <div class="home-icon" onclick="exitFull()">🏠</div>
</div>

<div class="version-note">alpha 1.0</div>

<script>
    // IF HOSTING ON RENDER/REPLIT, CHANGE THIS TO YOUR PUBLIC URL
    const API_BASE = "https://oranexa-web-hoster-free.onrender.com"; 
    
    // --- AUTH LOGIC ---
    let currentUser = JSON.parse(localStorage.getItem('ora_session_web')) || null;
    let isSignupMode = false;

    function toggleAuth() {
        isSignupMode = !isSignupMode;
        document.getElementById('auth-title').innerText = isSignupMode ? "SIGN UP" : "ORANEXA";
        document.querySelector('.auth-msg').innerText = isSignupMode ? "Already registered? Login" : "New Developer? Create Account";
        document.getElementById('err-msg').innerText = "";
    }

    function execAuth() {
        const username = document.getElementById('auth-user').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        const err = document.getElementById('err-msg');
        if(!username || !pass) { err.innerText = "Credentials required."; return; }
        if(username.length < 2) { err.innerText = "Username too short."; return; }

        let users = JSON.parse(localStorage.getItem('ora_dev_users')) || {};
        if(isSignupMode) {
            if(users[username]) { err.innerText = "Identity already exists."; return; }
            users[username] = { pass: pass };
            localStorage.setItem('ora_dev_users', JSON.stringify(users));
            loginUser(username);
        } else {
            if(users[username] && users[username].pass === pass) { loginUser(username); } 
            else { err.innerText = "Invalid credentials."; }
        }
    }

    function loginUser(username) {
        currentUser = username;
        localStorage.setItem('ora_session_web', JSON.stringify(username));
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('active-user').innerText = currentUser;
        showView('home');
    }

    function logout() {
        localStorage.removeItem('ora_session_web');
        location.reload();
    }

    window.onload = () => {
        if(currentUser) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('active-user').innerText = currentUser;
        }
    };

    // --- IDE LOGIC ---
    let proj = { html: '', css: '', js: '' };
    let curTab = 'html';

    function showView(id) {
        document.querySelectorAll('.view, #workspace').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = (id === 'workspace') ? 'flex' : 'block';
    }

    function newProject() { 
        proj = { html: '<h1>New Web</h1>', css: 'body{background:white;}', js: '' };
        tab('html'); 
        showView('workspace'); 
        run(); 
    }

    function tab(t) { curTab = t; document.getElementById('code-box').value = proj[t]; }
    function sync() { proj[curTab] = document.getElementById('code-box').value; }
    
    function run() { 
        document.getElementById('pre-frame').srcdoc = `<html><style>${proj.css}</style><body>${proj.html}<script>${proj.js}<\/script></body></html>`; 
    }
    
    function stopPreview() {
        document.getElementById('pre-frame').srcdoc = '';
    }

    function exitFull() {
        document.getElementById('full-view').style.display = 'none';
        document.getElementById('full-frame').srcdoc = '';
    }

    // --- SERVER COMMUNICATION ---
    async function deploy() {
        const id = prompt("Assign Global URL ID (e.g., 'my.game'):");
        if(!id) return;
        try {
            const res = await fetch(`${API_BASE}/deploy`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: currentUser, webData: { title: id, url: "ora://" + id, author: currentUser, content: proj }})
            });
            const data = await res.json();
            if(res.ok) { alert("Deployed Successfully!"); loadDash(); } 
            else { alert("Blocked: " + (data.details ? data.details.join(", ") : data.error)); }
        } catch(e) { alert("Deploy Failed. Is your Node.js Server running?"); }
    }

    async function handleSearch(e) {
        if(e.key !== 'Enter') return;
        const q = document.getElementById('search').value;
        try {
            const res = await fetch(`${API_BASE}/search?q=${q}`);
            const webs = await res.json();
            const grid = document.getElementById('res-grid');
            grid.innerHTML = '';
            webs.forEach(w => {
                grid.innerHTML += `<div class="card" onclick="openFull('${w.url}')"><h3>${w.title}</h3><p style="color:var(--sub-accent); font-size:0.7rem">${w.url}</p></div>`;
            });
            showView('results');
        } catch(e) {
            alert("Search Failed. Cannot connect to Global Server. Make sure 'node server.js' is running!");
        }
    }

    async function openFull(url) {
        try {
            const res = await fetch(`${API_BASE}/search?q=${url}`);
            const data = await res.json();
            if(data.length > 0) {
                document.getElementById('full-view').style.display = 'block';
                document.getElementById('full-frame').srcdoc = `<html><style>${data[0].content.css}</style><body>${data[0].content.html}<script>${data[0].content.js}<\/script></body></html>`;
            }
        } catch(e) { alert("Could not load web."); }
    }

    async function loadDash() {
        try {
            const res = await fetch(`${API_BASE}/user-webs?user=${currentUser}`);
            const webs = await res.json();
            const grid = document.getElementById('dash-grid');
            grid.innerHTML = '';
            webs.forEach(w => { 
                grid.innerHTML += `<div class="card" onclick="editExisting('${w.url}')"><h3>${w.title}</h3><p style="color:var(--sub-accent); font-size:0.7rem">${w.url}</p></div>`; 
            });
            showView('dashboard');
        } catch(e) { alert("Cannot load dashboard. Server offline."); }
    }

    async function editExisting(url) {
        try {
            const res = await fetch(`${API_BASE}/search?q=${url}`);
            const data = await res.json();
            if(data.length > 0) {
                proj = data[0].content;
                tab('html');
                showView('workspace');
                run();
            }
        } catch(e) {}
    }
</script>
</body>
</html>
