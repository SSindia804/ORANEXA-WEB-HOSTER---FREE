<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oranexa Alpha 1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --sidebar: #0a0a0c; --card: #0c0c0e; --accent: #10b981; --text: #f3f4f6; --border: #1f1f23; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 40px; border: 1px solid var(--border); border-radius: 12px; width: 300px; text-align: center; }
        .auth-input { width: 100%; background: #111; border: 1px solid var(--border); padding: 12px; margin-top: 10px; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        .auth-btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 800; margin-top: 20px; cursor: pointer; }

        #sidebar { width: 250px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        .search-bar { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 20px; padding: 8px 20px; color: white; outline: none; }

        .view { display: none; flex: 1; overflow-y: auto; padding: 30px; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; cursor: pointer; }
        .card:hover { border-color: var(--accent); }

        #workspace { display: none; height: 100%; width: 100%; }
        #workspace.active { display: flex; }
        .editor { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .preview { width: 50%; background: white; position: relative; }
        #code-box { flex: 1; background: #000; color: #0f0; padding: 20px; font-family: monospace; border: none; resize: none; outline: none; }

        #full-view { position: fixed; inset: 0; background: white; z-index: 8000; display: none; }
        .home-icon { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--accent); z-index: 8001; }
        .version-note { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; color: #444; letter-spacing: 2.5px; text-transform: uppercase; pointer-events: none; z-index: 9000; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="letter-spacing:6px; color:var(--accent)">ORANEXA</h2>
        <input type="text" id="username" class="auth-input" placeholder="Username">
        <input type="password" id="password" class="auth-input" placeholder="Password">
        <button class="auth-btn" onclick="login()">INITIALIZE</button>
    </div>
</div>

<div id="sidebar">
    <button class="auth-btn" onclick="newProject()">+ CREATE WEB</button>
    <button class="auth-btn" style="background:transparent; color:white; border:1px solid #333;" onclick="loadDash()">YOUR WEBS</button>
    <div style="margin-top:auto; font-size:0.7rem; color:#444" id="user-tag">Offline</div>
</div>

<div id="main">
    <header>
        <h2 style="color:var(--accent); cursor:pointer;" onclick="showView('home')">ORA</h2>
        <input type="text" id="search" class="search-bar" placeholder="Search ora://..." onkeypress="handleSearch(event)">
    </header>

    <div id="home" class="view active">
        <div style="text-align:center; margin-top:20vh;">
            <h1>GLOBAL REGISTRY</h1>
            <p style="color:#333">Alpha 1.0 Cloud Node Active</p>
        </div>
    </div>

    <div id="results" class="view"><div id="res-grid" class="grid"></div></div>
    <div id="dashboard" class="view"><div id="dash-grid" class="grid"></div></div>

    <div id="workspace">
        <div class="editor">
            <div style="background:#111; padding:10px; display:flex; gap:10px;">
                <button onclick="tab('html')">HTML</button>
                <button onclick="tab('css')">CSS</button>
                <button onclick="tab('js')">JS</button>
                <button style="margin-left:auto; background:var(--accent); border:none; padding:5px 15px; font-weight:800; cursor:pointer;" onclick="deploy()">DEPLOY</button>
            </div>
            <textarea id="code-box" oninput="sync()"></textarea>
        </div>
        <div class="preview">
            <iframe id="pre-frame" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>
</div>

<div id="full-view">
    <iframe id="full-frame" style="width:100%; height:100%; border:none;"></iframe>
    <div class="home-icon" onclick="document.getElementById('full-view').style.display='none'">🏠</div>
</div>

<div class="version-note">alpha 1.0</div>

<script>
    const API_BASE = "http://localhost:3000/api"; // Change this for Render/Replit
    let user = null;
    let proj = { html: '<h1>Hello</h1>', css: '', js: '' };
    let curTab = 'html';

    window.onload = () => { document.getElementById('auth-overlay').style.display = 'flex'; };

    function login() {
        user = document.getElementById('username').value;
        if(!user) return;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('user-tag').innerText = "User: " + user;
    }

    function showView(id) {
        document.querySelectorAll('.view, #workspace').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = (id === 'workspace') ? 'flex' : 'block';
    }

    function newProject() { tab('html'); showView('workspace'); }
    function tab(t) { curTab = t; document.getElementById('code-box').value = proj[t]; }
    function sync() { proj[curTab] = document.getElementById('code-box').value; run(); }
    function run() { document.getElementById('pre-frame').srcdoc = `<html><style>${proj.css}</style><body>${proj.html}<script>${proj.js}<\/script></body></html>`; }

    async function deploy() {
        const id = prompt("URL ID:");
        if(!id) return;
        const res = await fetch(`${API_BASE}/deploy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user, webData: { title: id, url: "ora://" + id, author: user, content: proj }})
        });
        const data = await res.json();
        if(res.ok) alert("Deployed!"); else alert("AI Blocked: " + data.details.join(", "));
    }

    async function handleSearch(e) {
        if(e.key !== 'Enter') return;
        const q = document.getElementById('search').value;
        const res = await fetch(`${API_BASE}/search?q=${q}`);
        const webs = await res.json();
        const grid = document.getElementById('res-grid');
        grid.innerHTML = '';
        webs.forEach(w => {
            grid.innerHTML += `<div class="card" onclick="openFull('${w.url}')"><h3>${w.title}</h3><p>${w.url}</p></div>`;
        });
        showView('results');
    }

    async function openFull(url) {
        const res = await fetch(`${API_BASE}/search?q=${url}`);
        const data = await res.json();
        if(data.length > 0) {
            document.getElementById('full-view').style.display = 'block';
            document.getElementById('full-frame').srcdoc = `<html><style>${data[0].content.css}</style><body>${data[0].content.html}<script>${data[0].content.js}<\/script></body></html>`;
        }
    }

    async function loadDash() {
        const res = await fetch(`${API_BASE}/user-webs?user=${user}`);
        const webs = await res.json();
        const grid = document.getElementById('dash-grid');
        grid.innerHTML = '';
        webs.forEach(w => { grid.innerHTML += `<div class="card"><h3>${w.title}</h3></div>`; });
        showView('dashboard');
    }
</script>
</body>
</html>
